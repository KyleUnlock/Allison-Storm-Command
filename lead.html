<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Allison Roofing ‚Äî Lead Detail</title>
  <style>
    body { margin:0; font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:#16202b; background:#f4f7fb; }
    header { background:#0f2740; color:#fff; padding:14px 16px; }
    header a { color:#cfe0f5; }
    main { max-width:640px; margin:0 auto; padding:16px; }
    .card { background:#fff; border:1px solid #d8e0ea; border-radius:12px; padding:16px; margin:12px 0; }
    dt { font-weight:600; color:#3a4a5b; margin-top:10px; }
    dd { margin:2px 0 0; }
    .withheld { color:#9a2c2c; font-weight:700; } .callable { color:#166534; font-weight:700; }
    .hist { font-size:.85rem; color:#5b6b7c; }
    .err { color:#9a2c2c; }
    .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:.75rem; font-weight:700; background:#e6eef8; color:#274b73; }
    .badge.sla { background:#fbe3e3; color:#9a2c2c; }
    .badge.score { background:#e5f0e6; color:#166534; }
    .claimForm { margin-top:8px; display:grid; gap:6px; }
    .claimForm input, .claimForm select { padding:6px; border:1px solid #d8e0ea; border-radius:6px; font:inherit; }
    .claimForm button { padding:8px; border:0; border-radius:6px; background:#2f6fb0; color:#fff; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>
  <header><a href="/board">‚Üê Board</a> &nbsp; Lead detail</header>
  <main>
    <div class="card" id="wrap"><p id="msg">Loading‚Ä¶</p></div>
  </main>
  <script>
    const money = (n)=> '$'+(Number(n||0)).toLocaleString();
    const esc = (s)=> String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const CLAIM_STATUSES = ['filed','inspection_scheduled','approved','supplement','paid','denied'];
    const id = new URL(location.href).searchParams.get('id');
    const pw = sessionStorage.getItem('boardPw');
    const H = pw ? { 'X-Board-Password': pw } : {};
    const PH = pw ? { 'X-Board-Password': pw, 'Content-Type':'application/json' } : { 'Content-Type':'application/json' };

    function claimView(c) {
      if (!c || !(c.status||c.carrier||c.claimNumber||c.adjuster)) return '<dt>Insurance claim</dt><dd>‚Äî none on file ‚Äî</dd>';
      return '<dt>Insurance claim</dt><dd>'+
        (c.status?('<span class="badge">'+esc(c.status)+'</span> '):'')+
        'Carrier '+esc(c.carrier||'‚Äî')+' ¬∑ Claim# '+esc(c.claimNumber||'‚Äî')+' ¬∑ Adjuster '+esc(c.adjuster||'‚Äî')+'</dd>';
    }

    async function load() {
      if (!id) { document.getElementById('msg').textContent = 'No lead id.'; return; }
      const r = await fetch('/api/lead?id='+encodeURIComponent(id), { headers:H });
      if (r.status === 401) { location.href = '/login'; return; }
      if (!r.ok) { document.getElementById('msg').innerHTML = '<span class="err">Lead not found.</span>'; return; }
      const { lead:l } = await r.json();
      const hist = (l.history||[]).map(h => '<div class="hist">'+esc(h.at)+' ‚Üí '+esc(h.status)+' ('+esc(h.actor)+')</div>').join('');
      const timeline = (l.notesLog||[]).length
        ? (l.notesLog||[]).slice().reverse().map(n => '<div class="hist">'+esc(n.at)+' ¬∑ '+esc(n.author)+': '+esc(n.text)+'</div>').join('')
        : '<div class="hist">‚Äî no notes ‚Äî</div>';
      const invoiceLink = (l.status === 'won')
        ? '<dt>Invoice</dt><dd><a href="/invoice?id='+esc(l.id)+'">View invoice / receipt ‚Üí</a> ¬∑ payment: '+esc(l.paymentStatus||'unpaid')+'</dd>'
        : '';
      const won = l.won ? '<dt>Won / billing</dt><dd>Collected '+money(l.won.collected)+' ¬∑ Costs '+money(l.won.costs)+
        ' ¬∑ Profit '+money(l.won.profit)+' ¬∑ Fee '+money(l.won.fee)+' ('+esc(l.won.reason)+')</dd>' : '';
      const c = l.claim || {};
      const slaBadge = l.slaBreached ? ' <span class="badge sla">SLA breached</span>' : '';
      document.getElementById('wrap').innerHTML =
        '<h2 style="margin-top:0;">'+esc(l.name||'(no name)')+' '+
          (l.score!=null?'<span class="badge score">score '+esc(l.score)+'</span>':'')+slaBadge+'</h2>'+
        '<dl>'+
          '<dt>Status</dt><dd>'+esc(l.status)+'</dd>'+
          '<dt>Source</dt><dd>'+esc(l.source)+(l.knownCustomer?' ¬∑ known customer (bills $0)':'')+'</dd>'+
          '<dt>Contact</dt><dd>'+esc(l.phone||'‚Äî')+' ¬∑ '+esc(l.email||'‚Äî')+'</dd>'+
          '<dt>Callable</dt><dd class="'+(l.callable?'callable':'withheld')+'">'+(l.callable?'yes':'no ('+esc(l.callReason)+')')+'</dd>'+
          '<dt>ZIP / address</dt><dd>'+esc(l.zip||'?')+' ¬∑ '+esc(l.address||'‚Äî')+'</dd>'+
          '<dt>Rep / assigned</dt><dd>'+esc(l.assignedRep||'‚Äî')+(l.assignedAt?(' ¬∑ '+esc(l.assignedAt)):'')+'</dd>'+
          '<dt>First touch (SLA '+esc((l.sla&&l.sla.thresholdMinutes)||60)+'m)</dt><dd>'+(l.firstTouchAt?esc(l.firstTouchAt):'‚Äî')+
            (l.slaBreached?' <span class="badge sla">breached</span>':'')+'</dd>'+
          claimView(c)+
          '<dt>Notes</dt><dd>'+esc(l.notes||'‚Äî')+'</dd>'+
          '<dt>Note timeline</dt><dd>'+timeline+'</dd>'+
          invoiceLink+
          won+
          '<dt>History</dt><dd>'+(hist||'‚Äî')+'</dd>'+
        '</dl>'+
        // E1 add-note (append-only) ‚Äî rides the operator-scoped /api/board PATCH.
        '<form class="claimForm" id="noteForm">'+
          '<strong>Add a note</strong>'+
          '<input id="noteText" placeholder="Note (server-stamps you + the time)">'+
          '<button type="submit">Add note</button>'+
        '</form>'+
        // C1 claim editor ‚Äî rides the operator-scoped /api/board PATCH path.
        '<form class="claimForm" id="claimForm">'+
          '<strong>Update insurance claim</strong>'+
          '<input id="carrier" placeholder="Carrier" value="'+esc(c.carrier||'')+'">'+
          '<input id="claimNumber" placeholder="Claim number" value="'+esc(c.claimNumber||'')+'">'+
          '<input id="adjuster" placeholder="Adjuster" value="'+esc(c.adjuster||'')+'">'+
          '<select id="claimStatus">'+['',...CLAIM_STATUSES].map(s=>'<option value="'+s+'"'+(s===(c.status||'')?' selected':'')+'>'+(s||'(status‚Ä¶)')+'</option>').join('')+'</select>'+
          '<button type="submit">Save claim</button>'+
        '</form>';
      document.getElementById('claimForm').addEventListener('submit', saveClaim);
      document.getElementById('noteForm').addEventListener('submit', saveNote);
    }

    async function saveNote(e) {
      e.preventDefault();
      const text = document.getElementById('noteText').value;
      if (!text.trim()) return;
      const r = await fetch('/api/board', { method:'PATCH', headers:PH, body:JSON.stringify({ id, note:text.trim() }) });
      if (!r.ok) { const d = await r.json().catch(()=>({})); alert(d.error||'Note failed'); return; }
      load();
    }

    async function saveClaim(e) {
      e.preventDefault();
      const claim = {
        carrier: document.getElementById('carrier').value,
        claimNumber: document.getElementById('claimNumber').value,
        adjuster: document.getElementById('adjuster').value,
      };
      const st = document.getElementById('claimStatus').value;
      if (st) claim.status = st;
      const r = await fetch('/api/board', { method:'PATCH', headers:PH, body:JSON.stringify({ id, claim }) });
      if (!r.ok) { const d = await r.json().catch(()=>({})); alert(d.error||'Claim update failed'); return; }
      load();
    }
    load();
  </script>
</body>
</html>
