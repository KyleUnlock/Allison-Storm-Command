<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Allison Roofing — Rep Console</title>
  <style>
    :root { --navy:#0f2740; --sky:#2f6fb0; --ink:#16202b; --line:#d8e0ea; --bg:#f4f7fb; --green:#166534; --red:#9a2c2c; }
    * { box-sizing:border-box; }
    body { margin:0; font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--ink); background:var(--bg); }
    header { background:var(--navy); color:#fff; padding:16px; display:flex; justify-content:space-between; align-items:center; }
    header h1 { font-size:1.05rem; margin:0; }
    main { max-width:640px; margin:0 auto; padding:12px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; margin:12px 0; }
    label { display:block; font-weight:600; margin:10px 0 4px; }
    input, select { width:100%; padding:12px; font-size:16px; min-height:44px; border:1px solid var(--line); border-radius:8px; }
    button { min-height:44px; padding:0 16px; font-size:1rem; font-weight:700; color:#fff; background:var(--sky); border:0; border-radius:10px; cursor:pointer; }
    .lead { border:1px solid var(--line); border-radius:12px; padding:14px; margin:10px 0; background:#fff; }
    .lead h3 { margin:0 0 4px; font-size:1.05rem; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .pill { font-size:.75rem; padding:3px 8px; border-radius:999px; background:#eef3f9; }
    .callable { color:var(--green); font-weight:700; }
    .withheld { color:var(--red); font-weight:700; }
    .tel { display:inline-block; min-height:44px; line-height:44px; padding:0 14px; background:#eaf7ee; color:var(--green); border-radius:10px; font-weight:700; text-decoration:none; }
    .empty { text-align:center; color:#5b6b7c; padding:32px 12px; }
    .muted { color:#5b6b7c; font-size:.85rem; }
    select.stage { margin-top:8px; }
    /* E1/E2 productivity UX */
    .next { margin:8px 0; padding:10px 12px; border-radius:10px; background:#eef3f9; border-left:4px solid #2f6fb0; font-weight:600; }
    .next.overdue { background:#fbe3e3; border-left-color:#9a2c2c; color:#9a2c2c; }
    .next.due { background:#fff4e2; border-left-color:#c9772a; color:#8a4b12; }
    .next.done { background:#e5f0e6; border-left-color:#166534; color:#166534; }
    .cadence { font-size:.82rem; color:#5b6b7c; margin:2px 0 8px; }
    .cadence.overdue { color:#9a2c2c; font-weight:700; }
    .composer { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0; }
    .composer button { flex:1 0 44%; background:#166534; }
    .composer button.sms { background:#2f6fb0; }
    .composer button:disabled { background:#b6c2ce; cursor:not-allowed; }
    .notes { margin-top:10px; }
    .notes .note { border-top:1px solid var(--line); padding:6px 0; font-size:.88rem; }
    .notes .note .by { color:#5b6b7c; font-size:.75rem; }
    .noteRow { display:flex; gap:8px; margin-top:8px; }
    .noteRow input { flex:1; }
    .noteRow button { flex:0 0 auto; background:#5b6b7c; }
    details.timeline summary { cursor:pointer; font-weight:600; margin-top:8px; min-height:44px; display:flex; align-items:center; }
  </style>
</head>
<body>
  <header>
    <h1>Rep Console</h1>
    <span id="who" class="muted" style="color:#cfe0f5;"></span>
  </header>
  <main>
    <div class="card" id="loginCard">
      <h2 style="margin-top:0;">Rep sign in</h2>
      <label for="name">Rep name</label>
      <input id="name" autocomplete="username" />
      <label for="passcode">Passcode</label>
      <input id="passcode" type="password" autocomplete="current-password" />
      <button id="loginBtn" style="width:100%;margin-top:14px;">Sign in</button>
      <p id="loginMsg" class="muted"></p>
    </div>

    <div id="board" hidden>
      <div class="row" style="justify-content:space-between;">
        <strong>My leads</strong>
        <button id="refreshBtn" style="background:#5b6b7c;">Refresh</button>
      </div>
      <div id="leads"></div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const STAGES = ['new','contacted','inspection','inspected','quoted','negotiation','won','production','completed'];

    async function login() {
      $('loginMsg').textContent = 'Signing in…';
      const r = await fetch('/api/rep-login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name:$('name').value.trim(), passcode:$('passcode').value })
      });
      const d = await r.json();
      if (r.ok) { $('loginMsg').textContent=''; $('who').textContent=d.rep; showBoard(); }
      else { $('loginMsg').textContent = d.error || 'Sign in failed'; }
    }

    async function showBoard() {
      $('loginCard').hidden = true; $('board').hidden = false;
      await load();
    }

    async function load() {
      const r = await fetch('/api/my-leads');
      if (r.status === 401) { $('board').hidden=true; $('loginCard').hidden=false; return; }
      const d = await r.json();
      $('who').textContent = d.rep || '';
      render(d.leads || []);
    }

    const esc = (s)=> String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    function cadenceLine(c) {
      if (!c || c.cadenceHours == null) return '';
      if (c.overdue) return '<div class="cadence overdue">Follow-up overdue — suggested touch was '+esc(c.nextTouchAt)+'</div>';
      const h = c.hoursUntilDue;
      const due = h <= 0 ? 'now' : ('in ~'+h+'h');
      return '<div class="cadence">Next touch '+due+' (every '+c.cadenceHours+'h at this stage)</div>';
    }

    function notesTimeline(l) {
      const notes = l.notesLog || [];
      const inner = notes.length
        ? notes.slice().reverse().map(n => '<div class="note">'+esc(n.text)+'<div class="by">'+esc(n.author)+' · '+esc(n.at)+'</div></div>').join('')
        : '<div class="muted" style="padding:6px 0;">No notes yet.</div>';
      return '<details class="timeline"><summary>Notes ('+notes.length+')</summary><div class="notes">'+inner+
        '<div class="noteRow"><input class="noteInput" placeholder="Add a note…" aria-label="Add a note" data-id="'+esc(l.id)+'">'+
        '<button class="noteBtn" data-id="'+esc(l.id)+'">Add</button></div></div></details>';
    }

    function render(leads) {
      const box = $('leads');
      if (!leads.length) { box.innerHTML = '<div class="empty">No leads assigned yet. New leads will appear here.</div>'; return; }
      box.innerHTML = '';
      for (const l of leads) {
        const el = document.createElement('div');
        el.className = 'lead';
        const na = l.nextAction || { action:'', urgency:'normal' };
        const tel = l.callable && l.phone
          ? '<a class="tel" href="tel:'+esc(l.phone)+'">Call '+esc(l.phone)+'</a>'
          : '<span class="withheld">Call withheld ('+esc(l.callReason)+')</span>';
        // E2 composer: click-to-call / SMS. Each button HARD-checks the gate on
        // the server; a blocked attempt shows the reason and dials/sends nothing.
        const composer =
          '<div class="composer">'+
            '<button class="callBtn" data-id="'+esc(l.id)+'"'+(l.callable?'':' disabled title="'+esc(l.callReason)+'"')+'>Log call</button>'+
            '<button class="sms smsBtn" data-id="'+esc(l.id)+'">Log SMS</button>'+
          '</div>';
        el.innerHTML =
          '<h3>'+esc(l.name||'(no name)')+'</h3>'+
          '<div class="next '+esc(na.urgency)+'">Next: '+esc(na.action)+'</div>'+
          cadenceLine(l.cadence)+
          '<div class="row"><span class="pill">'+esc(l.status)+'</span>'+
          '<span class="pill">'+esc(l.source||'')+'</span>'+
          '<span class="pill">ZIP '+esc(l.zip||'?')+'</span></div>'+
          '<p class="muted">'+esc(l.address||'')+'</p>'+
          '<div class="row" style="margin:8px 0;">'+tel+'</div>'+
          composer+
          notesTimeline(l)+
          '<label>Move stage</label>';
        const sel = document.createElement('select');
        sel.className = 'stage';
        for (const s of STAGES) {
          const o = document.createElement('option'); o.value=s; o.textContent=s; if (s===l.status) o.selected=true; sel.appendChild(o);
        }
        sel.addEventListener('change', () => move(l.id, sel.value));
        el.appendChild(sel);
        box.appendChild(el);
      }
      // wire composer + note buttons
      box.querySelectorAll('.callBtn').forEach(b => b.addEventListener('click', ()=> outreach(b.dataset.id, 'call')));
      box.querySelectorAll('.smsBtn').forEach(b => b.addEventListener('click', ()=> outreach(b.dataset.id, 'sms')));
      box.querySelectorAll('.noteBtn').forEach(b => b.addEventListener('click', ()=> {
        const input = box.querySelector('.noteInput[data-id="'+b.dataset.id+'"]');
        addNote(b.dataset.id, input ? input.value : '');
      }));
    }

    // E2 — outreach attempt. The SERVER enforces the DNC/consent gate; this only
    // records the compliant human touch. It never dials or texts from the page.
    async function outreach(id, channel) {
      const r = await fetch('/api/outreach-attempt', {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ id, channel })
      });
      const d = await r.json().catch(()=>({}));
      if (r.ok && d.permitted) {
        alert(channel === 'call'
          ? 'Call cleared — the number passed the DNC gate. Dial by hand now; the touch is logged.'
          : 'SMS cleared — consent is on file and not opted out. Text by hand now; the touch is logged.');
      } else if (r.ok) {
        alert('Blocked ('+channel+'): '+(d.reason||'gate failed')+'. No call or text was made.');
      } else {
        alert(d.error || 'Outreach failed');
      }
      load();
    }

    async function addNote(id, text) {
      if (!text || !text.trim()) return;
      const r = await fetch('/api/my-leads', {
        method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ id, note:text.trim() })
      });
      if (!r.ok) { const d = await r.json().catch(()=>({})); alert(d.error || 'Note failed'); }
      load();
    }

    async function move(id, status) {
      const body = { id, status };
      if (status === 'won') {
        // Abort the whole move on a cancelled prompt — never a silent $0 Won.
        const c = prompt('Amount collected ($)?', '0'); if (c === null) { load(); return; }
        const k = prompt('Direct job costs ($)?', '0'); if (k === null) { load(); return; }
        body.collected = Number(c) || 0;
        body.costs = Number(k) || 0;
      }
      const r = await fetch('/api/my-leads', {
        method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
      });
      if (!r.ok) { const d = await r.json(); alert(d.error || 'Update failed'); }
      load();
    }

    $('loginBtn').addEventListener('click', login);
    $('refreshBtn').addEventListener('click', load);
    load();
  </script>
</body>
</html>
