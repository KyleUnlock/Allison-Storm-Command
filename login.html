<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Allison Roofing — Operator Login</title>
  <style>
    body { margin:0; font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:#0f2740; color:#16202b; display:flex; min-height:100vh; align-items:center; justify-content:center; }
    .card { background:#fff; border-radius:14px; padding:24px; width:min(360px,92vw); }
    h1 { margin:0 0 12px; font-size:1.2rem; }
    label { display:block; font-weight:600; margin:12px 0 4px; }
    input { width:100%; padding:12px; font-size:16px; border:1px solid #d8e0ea; border-radius:8px; }
    button { width:100%; min-height:48px; margin-top:16px; font-weight:700; color:#fff; background:#2f6fb0; border:0; border-radius:10px; cursor:pointer; }
    .muted { color:#5b6b7c; font-size:.85rem; }
    .err { color:#9a2c2c; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Operator login</h1>
    <label for="pw">Board password</label>
    <input id="pw" type="password" autocomplete="current-password" />
    <button id="go">Sign in</button>
    <p id="msg" class="muted">Operators only. Reps sign in at <a href="/rep">/rep</a>.</p>
  </div>
  <script>
    document.getElementById('go').addEventListener('click', async () => {
      const pw = document.getElementById('pw').value;
      const msg = document.getElementById('msg');
      msg.textContent = 'Checking…'; msg.className = 'muted';
      const r = await fetch('/api/board', { headers: { 'X-Board-Password': pw } });
      if (r.ok) {
        sessionStorage.setItem('boardPw', pw);
        location.href = '/board';
      } else {
        msg.textContent = 'Incorrect password.'; msg.className = 'err';
      }
    });
  </script>
</body>
</html>
